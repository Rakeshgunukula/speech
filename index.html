<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Recognition</title>
    <style>
        body{
            background-color: black;
        }
    </style>
</head>
<body>
    <button id="btn" onclick="speak()">clickme</button>
    <script>
        const btn = document.querySelector('#btn');
        function speak(){
            const speech = new SpeechSynthesisUtterance('Hi, Welcome to my website');
            speech.rate = 1;
            speech.pitch = 1;
            speech.volume = 1;
            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
